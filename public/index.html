<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>同声传译工作台</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Live Interpreter</p>
            <h1>同声传译工作台</h1>
          </div>
          <div class="status-pill" id="connectionStatus">待配置</div>
        </header>

        <section class="controls" aria-label="传译控制">
          <label class="compact-field">
            <span>输入源</span>
            <select id="audioSource">
              <option value="mic">麦克风</option>
              <option value="system">电脑视频声音</option>
            </select>
          </label>
          <button class="primary-btn" id="startBtn" type="button">
            <span class="btn-icon">▶</span>
            <span>开始传译</span>
          </button>
          <button class="icon-btn" id="stopBtn" type="button" title="停止" disabled>■</button>
          <button class="icon-btn" id="clearBtn" type="button" title="清空记录">⌫</button>
          <label class="toggle">
            <input id="autoSpeak" type="checkbox" checked>
            <span>自动播报译文</span>
          </label>
        </section>

        <section class="panes aligned-mode">
          <article class="panel">
            <div class="panel-head">
              <h2>原文</h2>
              <span id="listeningState">未开始</span>
            </div>
            <div class="live-text" id="sourceText">
              <span class="muted">选择输入源后点击开始。电脑视频声音模式需要在浏览器共享窗口中勾选音频。</span>
            </div>
          </article>
          <article class="panel">
            <div class="panel-head">
              <h2>译文</h2>
              <span id="translationState">等待语音</span>
            </div>
            <div class="live-text translated" id="translatedText">
              <span class="muted">模型返回的译文会实时显示在这里。</span>
            </div>
          </article>
        </section>

        <section class="history-panel">
          <div class="panel-head">
            <h2>传译记录</h2>
            <button class="ghost-btn" id="exportBtn" type="button">导出文本</button>
          </div>
          <div class="history" id="history"></div>
        </section>
      </section>

      <aside class="settings" aria-label="模型设置">
        <header class="settings-header">
          <svg viewBox="0 0 24 24"><path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
          <h2>配置面板</h2>
        </header>

        <!-- Group 1: 翻译服务设置 -->
        <section class="settings-group">
          <div class="group-title">
            <svg viewBox="0 0 24 24"><path d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/></svg>
            <span>翻译引擎设置</span>
          </div>
          <label>
            <span>翻译 API Key</span>
            <input id="apiKey" type="password" autocomplete="off" placeholder="填入翻译接口 Key">
          </label>
          <label>
            <span>翻译 Base URL</span>
            <input id="baseUrl" type="url" value="https://dashscope.aliyuncs.com/compatible-mode/v1">
          </label>
          <label>
            <span>翻译模型</span>
            <input id="model" type="text" value="deepseek-v4-flash">
          </label>
        </section>

        <!-- Group 2: 语音转写设置 -->
        <section class="settings-group">
          <div class="group-title">
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
            <span>语音识别设置 (ASR)</span>
          </div>
          <label>
            <span>声音识别 API Key</span>
            <input id="asrApiKey" type="password" autocomplete="off" placeholder="留空则使用上述翻译 Key">
          </label>
          <label>
            <span>声音识别 Base URL (WebSocket)</span>
            <select id="asrBaseUrlSelect">
              <option value="wss://dashscope.aliyuncs.com/api-ws/v1/realtime">阿里云百炼 - Realtime (国内/推荐)</option>
              <option value="wss://dashscope.aliyuncs.com/api-ws/v1/inference">阿里云百炼 - Inference (国内/Paraformer)</option>
              <option value="wss://dashscope-intl.aliyuncs.com/api-ws/v1/realtime">阿里云百炼 - Realtime (国际/海外)</option>
              <option value="wss://dashscope-intl.aliyuncs.com/api-ws/v1/inference">阿里云百炼 - Inference (国际/Paraformer)</option>
              <option value="custom">自定义 URL...</option>
            </select>
            <input id="asrBaseUrl" type="url" value="wss://dashscope.aliyuncs.com/api-ws/v1/realtime" placeholder="输入自定义 WebSocket URL" style="margin-top: 5px; display: none;">
          </label>
          <label>
            <span>识别模型</span>
            <select id="asrModelSelect">
              <option value="qwen3-asr-flash-realtime">qwen3-asr-flash-realtime (推荐，极速千问大模型)</option>
              <option value="paraformer-realtime-v2">paraformer-realtime-v2 (推荐，通用转写 v2)</option>
              <option value="paraformer-realtime-v1">paraformer-realtime-v1 (通用转写 v1)</option>
              <option value="paraformer-realtime-8k-v2">paraformer-realtime-8k-v2 (电话专属 8k)</option>
              <option value="paraformer-realtime-8k-v1">paraformer-realtime-8k-v1 (电话专属 8k v1)</option>
              <option value="gummy-realtime-v1">gummy-realtime-v1 (实时语音翻译及识别)</option>
              <option value="custom">自定义模型名称...</option>
            </select>
            <input id="asrModel" type="text" value="qwen3-asr-flash-realtime" placeholder="输入自定义模型名称" style="margin-top: 5px; display: none;">
          </label>
        </section>

        <!-- Group 3: 传译偏好 -->
        <section class="settings-group">
          <div class="group-title">
            <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm6.93 6h-2.95a15.65 15.65 0 0 0-1.38-3.56A8.03 8.03 0 0 1 18.92 8zM12 4.04c.83 1.2 1.48 2.53 1.91 3.96h-3.82c.43-1.43 1.08-2.76 1.91-3.96zM4.26 14C4.1 13.36 4 12.69 4 12s.1-1.36.26-2h3.38c-.08.66-.14 1.34-.14 2s.06 1.34.14 2H4.26zm.82 2h2.95c.18 1.25.65 2.45 1.38 3.56A7.987 7.987 0 0 1 5.08 16zm2.95-8H5.08a7.987 7.987 0 0 1 4.33-3.56C8.68 5.71 8.21 6.91 8.03 8zM12 19.96c-.83-1.2-1.48-2.53-1.91-3.96h3.82c-.43 1.43-1.08 2.76-1.91 3.96zM14.34 14H9.66c-.09-.66-.16-1.34-.16-2s.07-1.34.16-2h4.68c.09.66.16 1.34.16 2s-.07 1.34-.16 2zm.25 5.56c.73-1.11 1.2-2.31 1.38-3.56h2.95a8.03 8.03 0 0 1-4.33 3.56zM16.3 14c.08-.66.14-1.34.14-2s-.06-1.34-.14-2h3.38c.16.64.26 1.31.26 2s-.1 1.36-.26 2h-3.38z"/></svg>
            <span>语言与偏好</span>
          </div>
          <div class="two-col">
            <label>
              <span>输入语言</span>
              <select id="sourceLang">
                <option value="zh-CN">中文普通话</option>
                <option value="en-US">English</option>
                <option value="ja-JP">日本語</option>
                <option value="ko-KR">한국어</option>
                <option value="fr-FR">Français</option>
                <option value="de-DE">Deutsch</option>
                <option value="es-ES">Español</option>
              </select>
            </label>
            <label>
              <span>目标语言</span>
              <select id="targetLang">
                <option value="英文">英文</option>
                <option value="中文">中文</option>
                <option value="日文">日文</option>
                <option value="韩文">韩文</option>
                <option value="法文">法文</option>
                <option value="德文">德文</option>
                <option value="西班牙文">西班牙文</option>
              </select>
            </label>
          </div>
          <label>
            <span>译文语气</span>
            <input id="tone" type="text" value="自然、清晰、适合会议口播">
          </label>
          <label>
            <span>术语表</span>
            <textarea id="glossary" rows="4" placeholder="例：注册系统 = registration system&#10;张三 = Zhang San"></textarea>
          </label>
        </section>

        <!-- Group 4: 性能微调 -->
        <section class="settings-group">
          <div class="group-title">
            <svg viewBox="0 0 24 24"><path d="M3 17v2h6v-2H3zM3 5v2h10V5H3zm10 16v-2h8v-2h-8v-2h-2v6h2zM7 9v2H3v2h4v2h2V9H7zm14 4v-2H11v2h10zm-6-4h2V7h4V5h-4V3h-2v6z"/></svg>
            <span>性能微调</span>
          </div>
          <label class="slider-field">
            <span>无标点分段延迟 <output id="debounceValue">500ms</output></span>
            <input id="debounceMs" type="range" min="200" max="1500" step="100" value="500">
          </label>
          <label class="slider-field">
            <span>原文分句长度 <output id="maxSegmentValue">90字符</output></span>
            <input id="maxSegmentChars" type="range" min="30" max="220" step="10" value="90">
          </label>
        </section>

        <p class="hint">麦克风模式使用浏览器语音识别。电脑视频声音模式使用屏幕/窗口音频共享 and DashScope 实时 ASR；开始后请选择正在播放视频的窗口或标签页，并勾选共享音频。</p>
      </aside>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
